name: Hunter's Daily News Brief

on:
  schedule:
    # 7:00 AM ET = 12:00 UTC (EST) / 11:00 UTC (EDT)
    # Run at both times; the script uses ET local time so duplicate is harmless
    - cron: '0 12 * * 1-6'   # MonâSat: Daily Brief at 7 AM ET
    - cron: '0 12 * * 0'     # Sunday:  Long-Read Edition at 7 AM ET
  workflow_dispatch:           # Allow manual trigger for testing

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
        run: python news_brief.py
